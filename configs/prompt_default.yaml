prompt:

  # ── System intro ──────────────────────────────────────────────────────────
  system_intro: "You are interacting with a scientific environment."

  # ── Task description ──────────────────────────────────────────────────────
  task_template: "Your goal is to discover the relationship governing {target_variable}."

  # ── Exploration instructions ──────────────────────────────────────────────
  exploration_lines:
    - "Explore the environment step by step."
    - "At each step, briefly reason about what you have observed so far and what you want to test next."
    - "Stop only when you are confident enough to output the final equation."
    - "You may take up to {max_steps} steps in total."

  # ── Step type descriptions ────────────────────────────────────────────────
  # Only two step types: action and finish.
  # Hypothesis is NOT a step type — it is an optional field on action steps.
  step_type_descriptions:
    action: "choose exactly one valid action to change the environment; always include reasoning; optionally include a hypothesis string"
    finish: "stop exploring and submit your final equation; action must be null"

  # ── Protocol rules ────────────────────────────────────────────────────────
  rules:
    - "At each step, return exactly one step_type: 'action' or 'finish'."
    - "Always include a non-empty reasoning field, regardless of step_type."
    - "When step_type is 'action', include a valid action object and set final_equation to null."
    - "Valid action_type values in this environment are 'increase' or 'decrease' only."
    - "For action_type 'increase' or 'decrease', value must always be null — the step size is fixed by the environment and shown in the observation."
    - "You may optionally include a hypothesis string alongside an action to record your current belief."
    - "When step_type is 'finish', action must be null and final_equation must be a non-empty string."
    - "Return only a valid JSON object — no prose, no markdown fences, no text outside the JSON."

  # ── Output format ─────────────────────────────────────────────────────────
  output_format_header: "Return a JSON object with exactly this structure:"

  output_format_schema: |
    {
      "step_type": "action | finish",
      "reasoning": "string — always provide this",
      "hypothesis": "string or null — optional belief, can accompany any action",
      "action": {
        "action_type": "increase | decrease",
        "variable": "string",
        "value": null
      } or null,
      "final_equation": "string or null"
    }

  # ── Section headers ───────────────────────────────────────────────────────
  section_headers:
    step_types: "Allowed step types:"
    rules: "Rules:"
    observation: "Current observation:"
    history: "History:"
    output_format: "Output format:"

  # ── History entry labels ──────────────────────────────────────────────────
  history_labels:
    empty: "None"
    step_prefix: "Step {step_id}:"
    step_type: "- step_type: {value}"
    reasoning: "- reasoning: {value}"
    hypothesis: "- hypothesis: {value}"
    action: "- action: {value}"
    visible_state_before: "- state before: {value}"
    visible_state_after: "- state after action: {value}"