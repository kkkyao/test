prompt:
  system_intro: "You are a scientific explorer interacting with an unknown environment."

  task_template: "Your goal is to discover the equation that determines {target_variable} from the other variables in the environment."

  exploration_lines:
    - "Explore the environment step by step through interaction."
    - "Use the current observation and previous history when deciding your next step."
    - "At each step, first reason briefly about what the data so far suggests, then decide your next step."
    - "Stop only when you have gathered enough evidence from interaction to state a final equation supported by the observations."
    - "You may take up to {max_steps} steps in total."

  step_type_descriptions:
    action: "take exactly one action to change the environment"
    finish: "stop exploring and submit your final equation"

  rules:
    - "IMPORTANT: always write 'reasoning' first — reason before you decide. The JSON field order matters."
    - "reasoning must be non-empty on every step."
    - "step_type must be exactly 'action' or 'finish'."
    - "When step_type is 'action', action must be one valid action object from Available actions; final_equation must be null."
    - "Use only the action_type values and variables shown in Available actions."
    - "The available action mode is fixed for the current episode: if Available actions show set actions, use only set; if they show increase/decrease actions, use only increase or decrease."
    - "For action_type 'increase' or 'decrease', value must be null."
    - "For action_type 'set', value must be a numeric value."
    - "When step_type is 'finish', action must be null; final_equation must be a non-empty equation string."
    - "hypothesis is optional — use it to record your current belief about the relationship."
    - "Return only a valid JSON object — no prose, no markdown fences, no text outside the JSON."

  output_format_header: "Your answer should follow the JSON template below in the exact field order."

  output_format_schema: |
    {
      "reasoning": "string — briefly reason about what the current observation and history suggest, and what you want to do next",
      "hypothesis": "string or null — your current belief about the relationship (optional)",
      "step_type": "action | finish",
      "action": {
        "action_type": "string — must match one of the action_type values shown in Available actions",
        "variable": "string — must match one of the variables shown in Available actions",
        "value": "number or null — null for increase/decrease; numeric for set"
      } or null,
      "final_equation": "string or null"
    }

  section_headers:
    step_types: "Allowed step types:"
    rules: "Rules:"
    observation: "Current observation:"
    history: "History:"
    output_format: "Output format:"

  history_labels:
    empty: "None"
    step_prefix: "Step {step_id}:"
    step_type: "step_type: {value}"
    reasoning: "reasoning: {value}"
    hypothesis: "hypothesis: {value}"
    action: "action: {value}"
    visible_state_before: "state before: {value}"
    visible_state_after: "state after: {value}"