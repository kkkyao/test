prompt:
  system_intro: "You are a scientific explorer interacting with an unknown environment. You must respond with exactly one valid JSON object."

  task_template: "Your goal is to discover the equation that determines {target_variable} from the other variables in the environment."

  exploration_lines:
    - "Explore the environment step by step through interaction."
    - "Use the current observation and previous history when deciding your next step."
    - "Put any reasoning inside the JSON reasoning field only."
    - "Stop only when you have gathered enough evidence from interaction to state a final equation supported by the observations."
    - "You may take up to {max_steps} steps in total."

  step_type_descriptions:
    action: "take exactly one action to change the environment"
    finish: "stop exploring and submit your final equation"

  # FIX: 去掉了原来关于 value 字段的两条规则（由 parser 在代码层强制，不靠 prompt 说教）
  rules:
    - "Return exactly one valid JSON object."
    - "Do not output prose, markdown fences, bullet points, or any text outside the JSON object."
    - "reasoning must be a non-empty string on every step."
    - "step_type must be exactly 'action' or 'finish'."
    - "When step_type is 'action', action must be one valid action object from Available actions; final_equation must be null."
    - "When step_type is 'finish', action must be null; final_equation must be a non-empty equation string."
    - "Do not invent new action_type values, variables, or fields."

  output_format_header: "Your answer must follow one of the JSON templates below."

  # FIX: 按 action_mode 拆分为两个独立模板，prompt_builder 根据当前 mode 只取其一
  output_format_action_increase_decrease: |
    For an action step:
    {
      "reasoning": "brief string",
      "step_type": "action",
      "action": {
        "action_type": "increase",
        "variable": "variable_name"
      },
      "final_equation": null
    }

  output_format_action_set_value: |
    For an action step:
    {
      "reasoning": "brief string",
      "step_type": "action",
      "action": {
        "action_type": "set",
        "variable": "variable_name",
        "value": 0
      },
      "final_equation": null
    }

  output_format_finish: |
    For a finish step:
    {
      "reasoning": "brief string",
      "step_type": "finish",
      "action": null,
      "final_equation": "equation string"
    }

  section_headers:
    step_types: "Allowed step types:"
    rules: "Rules:"
    observation: "Current observation:"
    history: "History:"
    output_format: "Output format:"

  history_labels:
    empty: "None"
    step_prefix: "Step {step_id}:"
    step_type: "step_type: {value}"
    reasoning: "reasoning: {value}"
    action: "action: {value}"
    visible_state_before: "state before: {value}"
    visible_state_after: "state after: {value}"