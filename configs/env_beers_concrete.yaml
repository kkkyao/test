environment:
  target_variable: absorbance

  variables:
    molar_absorptivity:
      manipulable: true
      initial_value: 1
      step_size: 1
      min_value: null
      max_value: null
      description: molar absorptivity coefficient of the solute

    concentration:
      manipulable: true
      initial_value: 2
      step_size: 1
      min_value: null
      max_value: null
      description: amount of solute per volume

    path_length:
      manipulable: true
      initial_value: 1
      step_size: 1
      min_value: null
      max_value: null
      description: distance the light travels through the solution

    transmittance:
      manipulable: false
      description: fraction of light transmitted through the solution

    absorbance:
      manipulable: false
      description: amount of light absorbed by the solution

  equations:
    absorbance: "molar_absorptivity * concentration * path_length"
    transmittance: "10 ** (-absorbance)"

representation:
  naming_mode: concrete
  metadata_level: rich
  name_mapping:
    molar_absorptivity: molar_absorptivity
    concentration: concentration
    path_length: path_length
    transmittance: transmittance
    absorbance: absorbance

actions:
  action_mode: increase_decrease

evaluation:
  variable_mapping:
    molar_absorptivity: molar_absorptivity
    concentration: concentration
    path_length: path_length
    transmittance: transmittance
    absorbance: absorbance

noise:
  enabled: false
  type: null
  params: {}