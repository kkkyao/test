environment:
  target_variable: force

  variables:
    mass:
      manipulable: true
      initial_value: 10
      step_size: 10
      min_value: null
      max_value: null
      description: mass of the object in kilograms

    acceleration:
      manipulable: true
      initial_value: 2
      step_size: 1
      min_value: null
      max_value: null
      description: acceleration of the object in metres per second squared

    force:
      manipulable: false
      description: net force applied to the object in Newtons

  equations:
    force: "mass * acceleration"

representation:
  naming_mode: concrete
  metadata_level: rich
  name_mapping:
    mass: mass
    acceleration: acceleration
    force: force

actions:
  action_mode: increase_decrease

evaluation:
  variable_mapping:
    mass: mass
    acceleration: acceleration
    force: force

noise:
  enabled: false
  type: null
  params: {}