environment:
  target_variable: absorbance

  variables:
    molar_absorptivity:
      manipulable: true
      initial_value: 1
      step_size: 1
      min_value: null
      max_value: null
      description: molar absorptivity coefficient of the solute

    concentration:
      manipulable: true
      initial_value: 2
      step_size: 1
      min_value: null
      max_value: null
      description: amount of solute per volume

    path_length:
      manipulable: true
      initial_value: 1
      step_size: 1
      min_value: null
      max_value: null
      description: distance the light travels through the solution

    transmittance:
      manipulable: false
      description: fraction of light transmitted through the solution

    absorbance:
      manipulable: false
      description: amount of light absorbed by the solution

  equations:
    absorbance: "molar_absorptivity * concentration * path_length"
    transmittance: "10 ** (-absorbance)"

representation:
  naming_mode: abstract
  metadata_level: none
  name_mapping:
    molar_absorptivity: A
    concentration: B
    path_length: C
    transmittance: T   # secondary observable output
    absorbance: Y      # primary target variable (renamed from Y2)

actions:
  action_mode: increase_decrease

evaluation:
  variable_mapping:
    A: molar_absorptivity
    B: concentration
    C: path_length
    T: transmittance   # kept in sync with name_mapping above
    Y: absorbance      # kept in sync with name_mapping above

noise:
  enabled: false
  type: null
  params: {}