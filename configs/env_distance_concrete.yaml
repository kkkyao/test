environment:
  target_variable: total_distance

  variables:
    distance_1:
      manipulable: true
      initial_value: 10
      step_size: 10
      min_value: null
      max_value: null
      description: first segment distance in metres

    distance_2:
      manipulable: true
      initial_value: 20
      step_size: 10
      min_value: null
      max_value: null
      description: second segment distance in metres

    distance_3:
      manipulable: true
      initial_value: 30
      step_size: 10
      min_value: null
      max_value: null
      description: third segment distance in metres

    total_distance:
      manipulable: false
      description: total distance in metres

  equations:
    total_distance: "distance_1 + distance_2 + distance_3"

representation:
  naming_mode: concrete
  metadata_level: rich
  name_mapping:
    distance_1: distance_1
    distance_2: distance_2
    distance_3: distance_3
    total_distance: total_distance

actions:
  action_mode: increase_decrease

evaluation:
  variable_mapping:
    distance_1: distance_1
    distance_2: distance_2
    distance_3: distance_3
    total_distance: total_distance

noise:
  enabled: false
  type: null
  params: {}