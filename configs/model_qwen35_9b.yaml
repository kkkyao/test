# Qwen3.5-9B — thinking is OFF by default for small Qwen3.5 models
# Requires transformers >= 4.51
agent:
  backend: hf_qwen
  model_name: Qwen/Qwen3.5-9B
  torch_dtype: bfloat16
  device_map: auto
  trust_remote_code: true
  generation:
    temperature: 0.0
    top_p: 1.0
    top_k: 20
    max_new_tokens: 512
    do_sample: false