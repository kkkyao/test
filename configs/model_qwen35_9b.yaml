# Qwen3.5-9B — thinking OFF by default for small Qwen3.5
# Official Qwen recommended: temperature=0.7, top_p=0.8, top_k=20
agent:
  backend: hf_qwen
  model_name: Qwen/Qwen3.5-9B
  dtype: bfloat16
  device_map: auto
  trust_remote_code: true
  disable_thinking: false
  generation:
    temperature: 0.7
    top_p: 0.8
    top_k: 20
    max_new_tokens: 512
    do_sample: true