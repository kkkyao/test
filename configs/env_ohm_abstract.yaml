environment:
  target_variable: voltage

  variables:
    current:
      manipulable: true
      initial_value: 2
      step_size: 1
      min_value: null
      max_value: null
      description: electric current in amperes

    resistance:
      manipulable: true
      initial_value: 10
      step_size: 10
      min_value: null
      max_value: null
      description: electrical resistance in ohms

    voltage:
      manipulable: false
      description: electric voltage in volts

  equations:
    voltage: "current * resistance"

representation:
  naming_mode: abstract
  metadata_level: none
  name_mapping:
    current: A
    resistance: B
    voltage: Y

actions:
  action_mode: increase_decrease

evaluation:
  variable_mapping:
    A: current
    B: resistance
    Y: voltage

noise:
  enabled: false
  type: null
  params: {}